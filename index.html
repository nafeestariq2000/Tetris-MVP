<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tetris MVP</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="game-container">
        <h1>Tetris</h1>
        <div id="score">Score: 0</div>
        <div id="next-pieces">
            <h3>Next:</h3>
            <canvas id="next-1" width="60" height="60"></canvas>
            <canvas id="next-2" width="60" height="60"></canvas>
            <canvas id="next-3" width="60" height="60"></canvas>
        </div>
        <canvas id="tetris-canvas" width="300" height="600"></canvas>
        <div id="controls">
            <p>Use arrow keys: Left/Right to move, Down to drop faster, Up to rotate</p>
            <p>Press P to pause/unpause</p>
        </div>
        <div id="power-up" style="display: none; margin-top: 10px;">
            <p>Power-up! Choose your next piece:</p>
            <button data-piece="I">I</button>
            <button data-piece="O">O</button>
            <button data-piece="T">T</button>
            <button data-piece="S">S</button>
            <button data-piece="Z">Z</button>
            <button data-piece="J">J</button>
            <button data-piece="L">L</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
